name: Deploy to VPS

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: z-ui-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Compute webapp version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          export TZ=Europe/Vienna

          existing_tag="$(git tag --points-at "$GITHUB_SHA" --list 'webapp/v*' | sort -V | tail -n 1)"

          if [ -n "$existing_tag" ]; then
            version="${existing_tag#webapp/v}"
            released_at="$(git for-each-ref --format='%(creatordate:iso-strict)' "refs/tags/${existing_tag}" | head -n 1)"
            should_create_tag=false
          else
            release_day="$(date +'%Y.%m.%d')"
            prefix="webapp/v${release_day}."
            max_n="$(git tag --list "${prefix}*" | sed -E "s#^webapp/v${release_day}\.##" | awk 'BEGIN { max = 0 } /^[0-9]+$/ { if ($1 > max) max = $1 } END { print max }')"
            next_n="$((max_n + 1))"
            version="${release_day}.${next_n}"
            existing_tag="webapp/v${version}"
            released_at="$(date +'%Y-%m-%dT%H:%M:%S%:z')"
            should_create_tag=true
          fi

          commit_sha="$(git rev-parse --short=7 "$GITHUB_SHA")"

          {
            echo "tag=$existing_tag"
            echo "version=$version"
            echo "released_at=$released_at"
            echo "commit_sha=$commit_sha"
            echo "should_create_tag=$should_create_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare .env payload
        id: prepare_env
        env:
          ENV_CLOUDFLARE: ${{ secrets.ENV_CLOUDFLARE }}
          ENV_DB: ${{ secrets.ENV_DB }}
          ENV_USERS: ${{ secrets.ENV_USERS }}
        run: |
          set -euo pipefail
          ENV_CONTENT="$(printf '%s\n%s\n%s\n' \
            "$ENV_CLOUDFLARE" \
            "$ENV_DB" \
            "$ENV_USERS")"
          ENV_B64="$(printf '%s' "$ENV_CONTENT" | base64 | tr -d '\n')"
          echo "env_b64=$ENV_B64" >> "$GITHUB_OUTPUT"

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          fingerprint: ""
          port: 22 

          script: |
            set -euo pipefail
            cd /home/sudash/apps/z-dl
            
            git config --global --add safe.directory /home/sudash/apps/z-dl
            
            git pull origin master
            
            printf '%s' '${{ steps.prepare_env.outputs.env_b64 }}' | base64 -d | sudo tee ./z-ui/.env > /dev/null

            export PUBLIC_WEBAPP_VERSION='${{ steps.version.outputs.version }}'
            export PUBLIC_WEBAPP_GIT_TAG='${{ steps.version.outputs.tag }}'
            export PUBLIC_WEBAPP_RELEASED_AT='${{ steps.version.outputs.released_at }}'
            export PUBLIC_WEBAPP_COMMIT_SHA='${{ steps.version.outputs.commit_sha }}'
            
            sudo env \
              PUBLIC_WEBAPP_VERSION="$PUBLIC_WEBAPP_VERSION" \
              PUBLIC_WEBAPP_GIT_TAG="$PUBLIC_WEBAPP_GIT_TAG" \
              PUBLIC_WEBAPP_RELEASED_AT="$PUBLIC_WEBAPP_RELEASED_AT" \
              PUBLIC_WEBAPP_COMMIT_SHA="$PUBLIC_WEBAPP_COMMIT_SHA" \
              docker compose build --no-cache --progress=plain

            sudo env \
              PUBLIC_WEBAPP_VERSION="$PUBLIC_WEBAPP_VERSION" \
              PUBLIC_WEBAPP_GIT_TAG="$PUBLIC_WEBAPP_GIT_TAG" \
              PUBLIC_WEBAPP_RELEASED_AT="$PUBLIC_WEBAPP_RELEASED_AT" \
              PUBLIC_WEBAPP_COMMIT_SHA="$PUBLIC_WEBAPP_COMMIT_SHA" \
              docker compose run --rm z-ui-migrator

            sudo env \
              PUBLIC_WEBAPP_VERSION="$PUBLIC_WEBAPP_VERSION" \
              PUBLIC_WEBAPP_GIT_TAG="$PUBLIC_WEBAPP_GIT_TAG" \
              PUBLIC_WEBAPP_RELEASED_AT="$PUBLIC_WEBAPP_RELEASED_AT" \
              PUBLIC_WEBAPP_COMMIT_SHA="$PUBLIC_WEBAPP_COMMIT_SHA" \
              docker compose up -d --remove-orphans z-ui

            sudo docker compose ps z-ui

            for i in {1..20}; do
              if sudo docker inspect -f '{{.State.Running}}' z-ui 2>/dev/null | grep -q true; then
                break
              fi

              if [ "$i" -eq 20 ]; then
                echo "z-ui did not enter running state in time"
                sudo docker compose logs --tail=200 z-ui
                exit 1
              fi

              sleep 1
            done

            sudo docker image prune -f

      - name: Create webapp release tag
        if: steps.version.outputs.should_create_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag -a "${{ steps.version.outputs.tag }}" "$GITHUB_SHA" -m "Webapp ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"
